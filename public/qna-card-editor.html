<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QnA 카드 에디터</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #6ee7d0;
      letter-spacing: 0.04em;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #34aa8f; color: #fff; }
    .btn-ghost { background: #0f3460; color: #6ee7d0; border: 1px solid #34aa8f44; }
    .btn-copy { background: #2a2a4a; color: #aaa; border: 1px solid #333; }

    /* ── Main layout ── */
    main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Left panel ── */
    .editor-panel {
      width: 45%;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }
    .tabs {
      display: flex;
      background: #0d1b2a;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      user-select: none;
    }
    .tab.active {
      color: #6ee7d0;
      border-bottom-color: #34aa8f;
    }
    .tab:hover:not(.active) { color: #aaa; }

    textarea {
      flex: 1;
      background: #0d1b2a;
      color: #c9d1d9;
      border: none;
      padding: 16px;
      font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    textarea:focus { background: #0f1e30; }
    .editor-pane { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .editor-pane.hidden { display: none; }

    /* ── Right panel ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #0d1b2a;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .preview-header span {
      font-size: 12px;
      color: #555;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .preview-status {
      font-size: 11px;
      color: #34aa8f;
      font-weight: 600;
    }
    iframe {
      flex: 1;
      border: none;
      background: #f0f4f2;
    }

    /* ── Resize handle ── */
    .resizer {
      width: 5px;
      background: #0f3460;
      cursor: col-resize;
      flex-shrink: 0;
    }
    .resizer:hover { background: #34aa8f44; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #34aa8f;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: none; }
  </style>
</head>
<body>

<header>
  <h1>🎨 QnA 카드 에디터</h1>
  <div class="header-actions">
    <button class="btn btn-copy" onclick="copyCSS()">CSS 복사</button>
    <button class="btn btn-ghost" onclick="resetEditor()">초기화</button>
    <button class="btn btn-primary" onclick="downloadHTML()">HTML 다운로드</button>
  </div>
</header>

<main>
  <!-- Left: Editor -->
  <div class="editor-panel" id="editorPanel">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('html')">HTML</div>
      <div class="tab" onclick="switchTab('css')">CSS</div>
    </div>
    <div class="editor-pane" id="htmlPane">
      <textarea id="htmlEditor" spellcheck="false" oninput="updatePreview()"></textarea>
    </div>
    <div class="editor-pane hidden" id="cssPane">
      <textarea id="cssEditor" spellcheck="false" oninput="updatePreview()"></textarea>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <!-- Right: Preview -->
  <div class="preview-panel">
    <div class="preview-header">
      <span>Preview</span>
      <span class="preview-status" id="previewStatus">실시간 업데이트 중</span>
    </div>
    <iframe id="preview" title="미리보기"></iframe>
  </div>
</main>

<div id="toast"></div>

  transition: opacity .15s;

.submit-btn:hover { opacity: 0.88; }`;

// ─────────────────────────────────────────
//  Editor logic
// ─────────────────────────────────────────
const htmlEditor = document.getElementById('htmlEditor');
const cssEditor  = document.getElementById('cssEditor');
const preview    = document.getElementById('preview');
const toast      = document.getElementById('toast');

let currentTab = 'html';
let debounceTimer = null;

// Init
htmlEditor.value = INITIAL_HTML;
cssEditor.value  = INITIAL_CSS;
updatePreview();

function buildPreviewDoc() {
  return `<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f4f2; }
${cssEditor.value}
</style>
</head><body>
${htmlEditor.value}
</body></html>`;
}

function updatePreview() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    preview.srcdoc = buildPreviewDoc();
    document.getElementById('previewStatus').textContent = '업데이트됨 ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }, 300);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[tab === 'html' ? 0 : 1].classList.add('active');
  document.getElementById('htmlPane').classList.toggle('hidden', tab !== 'html');
  document.getElementById('cssPane').classList.toggle('hidden', tab !== 'css');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function copyCSS() {
  navigator.clipboard.writeText(cssEditor.value).then(() => showToast('CSS 복사됨!'));
}

function downloadHTML() {
  const blob = new Blob([buildPreviewDoc()], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'qna-card-design.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('다운로드 완료!');
}

function resetEditor() {
  if (!confirm('초기 상태로 되돌리시겠어요?')) return;
  htmlEditor.value = INITIAL_HTML;
  cssEditor.value  = INITIAL_CSS;
  updatePreview();
  showToast('초기화됨');
}

// Tab key support in textareas
[htmlEditor, cssEditor].forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = el.selectionStart, end = el.selectionEnd;
      el.value = el.value.substring(0, s) + '  ' + el.value.substring(end);
      el.selectionStart = el.selectionEnd = s + 2;
      updatePreview();
    }
  });
});

// ── Resizer drag ──
const resizer     = document.getElementById('resizer');
const editorPanel = document.getElementById('editorPanel');
let isResizing = false;
let startX, startW;

resizer.addEventListener('mousedown', e => {
  isResizing = true;
  startX = e.clientX;
  startW = editorPanel.offsetWidth;
  document.body.style.userSelect = 'none';
  document.body.style.cursor = 'col-resize';
});
document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const w = Math.max(260, Math.min(startW + (e.clientX - startX), window.innerWidth - 200));
  editorPanel.style.width = w + 'px';
});
document.addEventListener('mouseup', () => {
  isResizing = false;
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
});
</script>
</body>
</html>
